aid: apache-james
name: Apache James
description: >-
  Apache James (Java Apache Mail Enterprise Server) is a portable and enterprise-ready mail server built entirely in Java. It implements SMTP, IMAP, POP3, and JMAP protocols and provides a modular architecture with a comprehensive administration REST API and Cassandra-backed distributed deployment.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Email
  - IMAP
  - Java
  - JMAP
  - Mail Server
  - Open Source
  - SMTP
created: '2026-03-16'
modified: '2026-04-19'
url: >-
  https://raw.githubusercontent.com/api-evangelist/apache-james/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: apache-james:webadmin-rest-api
    name: Apache James WebAdmin REST API
    description: >-
      The James WebAdmin API provides REST endpoints for managing domains, users, mailboxes, mail repositories, mail queues, quotas, drop lists, and async tasks. It is the primary management interface for James server instances.
    humanURL: https://james.apache.org/server/manage-webadmin.html
    tags:
      - Administration
      - Email
      - REST
    properties:
      - type: Documentation
        url: https://james.apache.org/server/manage-webadmin.html
      - type: OpenAPI
        url: openapi/apache-james-webadmin-rest-api.yaml

  - aid: apache-james:jmap-api
    name: Apache James JMAP API
    description: >-
      The JMAP (JSON Meta Application Protocol) implementation in James provides a modern, efficient email protocol for synchronizing messages, mailboxes, contacts, and calendars for email clients.
    humanURL: https://james.apache.org/server/rfcs-compliance.html
    tags:
      - Email
      - JMAP
      - JSON
    properties:
      - type: Documentation
        url: https://james.apache.org/server/rfcs-compliance.html

