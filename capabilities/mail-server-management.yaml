naftiko: "1.0.0-alpha1"

info:
  label: "Apache James Mail Server Management"
  description: "Workflow capability for mail server administrators to manage domains, users, mailboxes, and monitor tasks in Apache James."
  tags:
    - Apache James
    - Email Administration
    - Mail Server Management
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      JAMES_ADMIN_TOKEN: JAMES_ADMIN_TOKEN

capability:
  consumes:
    - import: james-webadmin
      location: ./shared/webadmin-rest-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: james-mail-management-api
      description: "Unified REST API for Apache James mail server management."
      resources:
        - path: /v1/domains
          name: domains
          operations:
            - method: GET
              name: list-domains
              call: "james-webadmin.list-domains"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-domain
              call: "james-webadmin.create-domain"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users
          name: users
          operations:
            - method: GET
              name: list-users
              call: "james-webadmin.list-users"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-user
              call: "james-webadmin.create-user"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tasks
          name: tasks
          operations:
            - method: GET
              name: list-tasks
              call: "james-webadmin.list-tasks"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: james-mail-management-mcp
      transport: http
      description: "MCP server for AI-assisted Apache James mail server management."
      tools:
        - name: list-domains
          description: List all email domains configured in the James server
          hints:
            readOnly: true
            openWorld: true
          call: "james-webadmin.list-domains"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-domain
          description: Create a new email domain in the James server
          hints:
            readOnly: false
          call: "james-webadmin.create-domain"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: List all user accounts in the James mail server
          hints:
            readOnly: true
            openWorld: true
          call: "james-webadmin.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: Create a new mail user account
          hints:
            readOnly: false
          call: "james-webadmin.create-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tasks
          description: List asynchronous administrative tasks and their statuses
          hints:
            readOnly: true
            openWorld: true
          call: "james-webadmin.list-tasks"
          outputParameters:
            - type: object
              mapping: "$."
