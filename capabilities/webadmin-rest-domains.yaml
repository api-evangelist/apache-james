        name: listdomains
        description: Apache james Apache James WebAdmin List Domains
        call: webadmin-rest-domains.listdomains
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdomain
        description: Apache james Apache James WebAdmin Create Domain
        call: webadmin-rest-domains.createdomain
