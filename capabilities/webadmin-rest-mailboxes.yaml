naftiko: 1.0.0-alpha2
info:
  label: Apache James WebAdmin REST API — Mailboxes
  description: 'Apache James WebAdmin REST API — Mailboxes. 1 operations. Lead operation: Apache james Apache James WebAdmin
    List User Mailboxes. Self-contained Naftiko capability covering one Apache James business surface.'
  tags:
  - Apache James
  - Mailboxes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_JAMES_API_KEY: APACHE_JAMES_API_KEY
capability:
  consumes:
  - type: http
    namespace: webadmin-rest-mailboxes
    baseUri: http://localhost:8000
    description: Apache James WebAdmin REST API — Mailboxes business capability. Self-contained, no shared references.
    resources:
    - name: users-username-mailboxes
      path: /users/{username}/mailboxes
      operations:
      - name: listusermailboxes
        method: GET
        description: Apache james Apache James WebAdmin List User Mailboxes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.APACHE_JAMES_API_KEY}}'
  exposes:
  - type: rest
    namespace: webadmin-rest-mailboxes-rest
    port: 8080
    description: REST adapter for Apache James WebAdmin REST API — Mailboxes. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/users/{username}/mailboxes
      name: users-username-mailboxes
      description: REST surface for users-username-mailboxes.
      operations:
      - method: GET
        name: listusermailboxes
        description: Apache james Apache James WebAdmin List User Mailboxes
        call: webadmin-rest-mailboxes.listusermailboxes
        with:
          username: rest.username
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: webadmin-rest-mailboxes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache James WebAdmin REST API — Mailboxes. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: apache-james-apache-james-webadmin
      description: Apache james Apache James WebAdmin List User Mailboxes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: webadmin-rest-mailboxes.listusermailboxes
      with:
        username: tools.username
      outputParameters:
      - type: object
        mapping: $.
